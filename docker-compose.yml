services:
  frontend:
    build: ./frontend
    ports:
      - "3001:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-http://localhost:8000}
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - FAISS_INDEX_PATH=${FAISS_INDEX_PATH:-/app/faiss_data/index.bin}
      - UPLOAD_DIR=${UPLOAD_DIR:-/app/uploads}
      - THRESHOLD=${THRESHOLD:-0.80}
    volumes:
      - faiss_data:/app/faiss_data
      - uploads_data:/app/uploads

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    command: celery -A app.worker.celery_app worker --loglevel=info
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - FAISS_INDEX_PATH=${FAISS_INDEX_PATH:-/app/faiss_data/index.bin}
      - UPLOAD_DIR=${UPLOAD_DIR:-/app/uploads}
      - THRESHOLD=${THRESHOLD:-0.80}
    volumes:
      - faiss_data:/app/faiss_data
      - uploads_data:/app/uploads

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    command: celery -A app.worker.celery_app beat --loglevel=info
    depends_on:
      - redis
    environment:
      - REDIS_URL=${REDIS_URL}

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-sportshield}
      - POSTGRES_USER=${POSTGRES_USER:-sportshield}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

volumes:
  postgres_data:
  faiss_data:
  uploads_data:
